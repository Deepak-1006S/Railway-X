<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IndianRail - Train Search</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#0a1628; color:#fff; min-height:100vh; }
    nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 40px; background:linear-gradient(90deg,#003580,#0055b3);
      box-shadow:0 2px 20px rgba(0,0,0,0.5); position:sticky; top:0; z-index:100;
    }
    .logo { display:flex; align-items:center; gap:12px; cursor:pointer; }
    .logo span { font-size:1.4rem; font-weight:700; color:#fff; }
    .logo small { display:block; font-size:0.7rem; color:#aad4ff; letter-spacing:2px; }
    nav ul { list-style:none; display:flex; gap:24px; }
    nav ul li a {
      color:#cce0ff; text-decoration:none; font-size:0.95rem; font-weight:500;
      padding:6px 12px; border-radius:6px; transition:all 0.3s;
    }
    nav ul li a:hover, nav ul li a.active { background:rgba(255,255,255,0.15); color:#fff; }
    .btn-login {
      background:linear-gradient(135deg,#ff6b00,#ff9500); color:#fff;
      border:none; padding:9px 22px; border-radius:25px; font-weight:600;
      cursor:pointer; font-size:0.9rem; transition:all 0.3s;
    }
    .btn-login:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(255,107,0,0.5); }

    .page-header {
      background:linear-gradient(135deg,#001840,#003580);
      padding:50px 40px 30px; text-align:center;
    }
    .page-header h1 { font-size:2.2rem; font-weight:800; margin-bottom:8px; }
    .page-header p { color:#8ab4d8; font-size:1rem; }

    .search-bar-container {
      background:rgba(255,255,255,0.04); border-bottom:1px solid rgba(255,255,255,0.08);
      padding:20px 40px;
    }
    .search-row { display:flex; gap:12px; max-width:900px; margin:0 auto; flex-wrap:wrap; }
    .search-row input, .search-row select {
      flex:1; min-width:160px; padding:12px 16px;
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
      color:#fff; border-radius:10px; font-size:0.95rem; outline:none; transition:all 0.3s;
    }
    .search-row input:focus, .search-row select:focus { border-color:#0078ff; }
    .search-row input::placeholder { color:#5a7a99; }
    .search-row select option { background:#0d2050; }
    .btn-go {
      padding:12px 28px; background:linear-gradient(135deg,#ff6b00,#ff9500);
      color:#fff; border:none; border-radius:10px; font-weight:700; cursor:pointer;
      font-size:0.95rem; transition:all 0.3s; white-space:nowrap;
    }
    .btn-go:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(255,107,0,0.4); }

    .filters {
      display:flex; gap:10px; padding:16px 40px; max-width:1200px; margin:0 auto;
      flex-wrap:wrap; align-items:center;
    }
    .filter-label { color:#8ab4d8; font-size:0.85rem; margin-right:4px; }
    .filter-btn {
      padding:6px 16px; border-radius:20px; border:1px solid rgba(255,255,255,0.2);
      background:transparent; color:#8ab4d8; cursor:pointer; font-size:0.85rem; transition:all 0.3s;
    }
    .filter-btn.active { background:#003580; color:#fff; border-color:#0055b3; }
    .filter-btn:hover { border-color:#4da6ff; color:#4da6ff; }

    .results-container { max-width:1200px; margin:0 auto; padding:10px 40px 60px; }
    .results-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 0 16px; border-bottom:1px solid rgba(255,255,255,0.07); margin-bottom:20px;
    }
    .results-count { color:#8ab4d8; font-size:0.9rem; }
    .results-count span { color:#ff9500; font-weight:700; }

    .train-card {
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      border-radius:16px; padding:22px 28px; margin-bottom:16px;
      transition:all 0.3s; display:grid;
      grid-template-columns:1fr auto 1fr auto auto; gap:20px; align-items:center;
    }
    .train-card:hover { border-color:#0078ff; background:rgba(0,120,255,0.06); transform:translateY(-2px); }
    .train-name h3 { font-size:1rem; font-weight:700; margin-bottom:4px; }
    .train-num { font-size:0.8rem; color:#8ab4d8; }
    .train-type {
      display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.72rem;
      font-weight:600; margin-top:6px; text-transform:uppercase; letter-spacing:1px;
    }
    .type-superfast { background:rgba(255,107,0,0.2); color:#ff9500; }
    .type-express { background:rgba(0,120,255,0.2); color:#4da6ff; }
    .type-rajdhani { background:rgba(150,0,255,0.2); color:#c87eff; }
    .type-shatabdi { background:rgba(0,200,100,0.2); color:#00c864; }
    .type-duronto { background:rgba(255,50,100,0.2); color:#ff6688; }
    .type-garib { background:rgba(0,200,200,0.2); color:#00cccc; }
    .type-vande { background:rgba(255,200,0,0.2); color:#ffc800; }
    .type-intercity { background:rgba(100,200,255,0.2); color:#64c8ff; }

    .time-block { text-align:center; }
    .time-block .time { font-size:1.4rem; font-weight:800; }
    .time-block .station { font-size:0.78rem; color:#8ab4d8; margin-top:4px; }
    .time-block .day { font-size:0.72rem; color:#ff9500; }

    .journey-mid { text-align:center; min-width:120px; }
    .duration { font-size:0.85rem; color:#8ab4d8; margin-bottom:8px; }
    .line-track { display:flex; align-items:center; gap:4px; justify-content:center; }
    .dot { width:8px; height:8px; border-radius:50%; background:#0078ff; }
    .line { flex:1; height:2px; background:linear-gradient(90deg,#0078ff,#00c864); }

    .classes { display:flex; flex-direction:column; gap:6px; }
    .class-row { display:flex; gap:8px; flex-wrap:wrap; }
    .class-badge {
      padding:4px 12px; border-radius:8px; font-size:0.78rem; font-weight:600;
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); cursor:pointer;
      transition:all 0.2s; white-space:nowrap;
    }
    .class-badge:hover { background:rgba(0,120,255,0.2); border-color:#0078ff; }
    .class-badge .seats { color:#00c864; font-size:0.7rem; margin-left:4px; }
    .class-badge .price { color:#ff9500; font-size:0.7rem; margin-left:2px; }

    .btn-book {
      padding:12px 24px; background:linear-gradient(135deg,#003580,#0055b3);
      color:#fff; border:none; border-radius:10px; font-weight:700; cursor:pointer;
      font-size:0.9rem; transition:all 0.3s; white-space:nowrap;
    }
    .btn-book:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(0,83,179,0.5); }

    .days-run { font-size:0.72rem; color:#8ab4d8; margin-top:6px; }
    .days-run span { color:#4da6ff; }

    footer {
      background:rgba(0,0,0,0.4); border-top:1px solid rgba(255,255,255,0.06);
      padding:20px 40px; text-align:center; color:#5a7a99; font-size:0.85rem;
    }
    @media(max-width:900px){
      nav ul { display:none; }
      .train-card { grid-template-columns:1fr 1fr; gap:14px; }
      .btn-book { grid-column:span 2; }
    }
    @media(max-width:600px){
      .results-container { padding:10px 16px 40px; }
      .search-bar-container { padding:16px; }
      .train-card { grid-template-columns:1fr; }
      .btn-book { grid-column:unset; }
    }
  </style>
</head>

</div>

<div class="filters">

</div>

<div class="results-container">

  </div>
  <div id="trainList"></div>
</div>

</footer>

let currentFilter = '';

const PAGE_SIZE = 20;
let visibleCount = PAGE_SIZE;
let currentResults = [];

function typeClass(type){
  const m = {'Rajdhani':'rajdhani','Shatabdi':'shatabdi','Vande Bharat':'vande',
    'Duronto':'duronto','Superfast':'superfast','Express':'express',
    'Garib Rath':'garib','Intercity':'intercity'};
  return 'type-' + (m[type] || 'express');
}

function trainCardHTML(t){
  const classBadges = t.classes.map(c =>
    `<div class="class-badge" onclick="bookTrain('${t.num}','${encodeURIComponent(t.name)}','${c.c}','${c.p}')">
      ${c.c}<span class="seats"> ${c.s} avl</span><span class="price"> ₹${c.p.toLocaleString('en-IN')}</span>
    </div>`
  ).join('');
  return `
  <div class="train-card">
    <div class="train-name">
      <h3>${t.name}</h3>
      <div class="train-num"><i class="fas fa-hashtag"></i> ${t.num}</div>
      <div class="train-type ${typeClass(t.type)}">${t.type}</div>
      <div class="days-run">Runs: <span>${t.days}</span></div>
    </div>
    <div class="time-block">
      <div class="time">${t.dep}</div>
      <div class="station">${t.from}</div>
    </div>
    <div class="journey-mid">
      <div class="duration"><i class="far fa-clock"></i> ${t.dur}</div>
      <div class="line-track"><div class="dot"></div><div class="line"></div><div class="dot"></div></div>
    </div>
    <div class="time-block">
      <div class="time">${t.arr}</div>
      <div class="station">${t.to}</div>
    </div>
    <div>
      <div class="class-row">${classBadges}</div>
      <button class="btn-book" onclick="bookTrain('${t.num}','${encodeURIComponent(t.name)}','',0)" style="margin-top:10px;width:100%;">
        <i class="fas fa-ticket-alt"></i> Book Now
      </button>
    </div>
  </div>`;
}

function renderTrains(list){
  currentResults = list;
  visibleCount = PAGE_SIZE;
  const container = document.getElementById('trainList');
  document.getElementById('trainCount').textContent = list.length;
  if(!list.length){
    container.innerHTML = '<div style="text-align:center;padding:60px;color:#8ab4d8;"><i class="fas fa-train" style="font-size:3rem;opacity:0.3;display:block;margin-bottom:16px;"></i>No trains found. Try different stations or clear the filter.</div>';
    return;
  }
  const slice = list.slice(0, visibleCount);
  container.innerHTML = slice.map(trainCardHTML).join('') + loadMoreBtn(list.length, visibleCount);
}

function loadMoreBtn(total, shown){
  if(shown >= total) return '';
  return `<div style="text-align:center;margin:24px 0;">
    <button onclick="loadMore()" style="padding:13px 40px;background:linear-gradient(135deg,#003580,#0055b3);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;">
      <i class="fas fa-chevron-down"></i> Load More (${total - shown} remaining)
    </button>
  </div>`;
}

function loadMore(){
  visibleCount += PAGE_SIZE;
  const container = document.getElementById('trainList');
  const slice = currentResults.slice(0, visibleCount);
  container.innerHTML = slice.map(trainCardHTML).join('') + loadMoreBtn(currentResults.length, visibleCount);
}

function bookTrain(num, encodedName, cls, price){
  // Find the full train object so we can pass all details to the booking page
  const train = TRAINS.find(t => t.num === num && encodeURIComponent(t.name) === encodedName);
  localStorage.setItem('bookTrainNum',  num);
  localStorage.setItem('bookTrainName', decodeURIComponent(encodedName));
  localStorage.setItem('bookClass',     cls);
  localStorage.setItem('bookPrice',     price);
  if(train){
    localStorage.setItem('bookDep',  train.dep);
    localStorage.setItem('bookArr',  train.arr);
    localStorage.setItem('bookDur',  train.dur);
    localStorage.setItem('bookFrom', train.from);
    localStorage.setItem('bookTo',   train.to);
    // Pass all classes so booking page can build the class selector from real data
    localStorage.setItem('bookClasses', JSON.stringify(train.classes));
  }
  window.location.href = 'booking.html';
}

function normalizeQuery(q){
  const key = q.toLowerCase().trim();
  return STATION_ALIASES[key] || key;
}

function matchStation(stationName, query){
  if(!query) return true;
  const normalizedQuery = normalizeQuery(query);
  const s = stationName.toLowerCase();
  // Direct substring match on normalized query
  if(s.includes(normalizedQuery)) return true;
  // Word-by-word match (all typed words must appear)
  const words = normalizedQuery.split(/\s+/).filter(Boolean);
  return words.every(w => s.includes(w));
}

function searchTrains(){
  const from  = document.getElementById('fromStn').value.trim();
  const to    = document.getElementById('toStn').value.trim();
  const cls   = document.getElementById('classFilter').value;
  let results = TRAINS;
  if(from) results = results.filter(t => matchStation(t.from, from));
  if(to)   results = results.filter(t => matchStation(t.to,   to));
  if(currentFilter) results = results.filter(t => t.type === currentFilter);
  if(cls)  results = results.filter(t => t.classes.some(c => c.c === cls));
  const route = from||to
    ? `${from || 'Any'} → ${to || 'Any'}`
    : 'All ' + TRAINS.length + ' Trains';
  document.getElementById('routeLabel').textContent = route;
  renderTrains(results);
}

function filterType(btn, type){
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = type;
  searchTrains();
}

function checkLogin(){ window.location.href = 'index.html'; }

// Init on page load
document.getElementById('travelDate').value = new Date().toISOString().split('T')[0];
const _from = localStorage.getItem('searchFrom') || '';
const _to   = localStorage.getItem('searchTo')   || '';
const _date = localStorage.getItem('searchDate') || '';
if(_from) document.getElementById('fromStn').value = _from;
if(_to)   document.getElementById('toStn').value   = _to;
if(_date) document.getElementById('travelDate').value = _date;

// Only auto-filter when the user came here via the search form (both from+to are set)
// Otherwise show all trains so the page is never empty
if(_from && _to){
  searchTrains();
} else {
  // Clear any stale single-field values so results aren't accidentally filtered
  document.getElementById('fromStn').value = _from;
  document.getElementById('toStn').value   = _to;
  renderTrains(TRAINS);
  document.getElementById('routeLabel').textContent = 'All ' + TRAINS.length + ' Trains';
}

const _user = localStorage.getItem('loggedInUser');
if(_user) document.getElementById('navLoginBtn').innerHTML = '<i class="fas fa-user-check"></i> ' + _user;
